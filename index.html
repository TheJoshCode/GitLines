    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ===== AD STYLES ===== */
        .ad-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(30, 30, 40, 0.6);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        .ad-placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: center;
            padding: 8px;
            pointer-events: none;
        }

        /* Desktop side ads */
        .ad-desktop {
            display: none;
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            height: 600px;
            z-index: 50;
        }

        .ad-desktop-left { left: 20px; }
        .ad-desktop-right { right: 20px; }

        /* Mobile top/bottom ads */
        .ad-mobile {
            display: flex;
            width: min(100%, 400px);
            margin: clamp(5px, 1vh, 10px) 0;
            height: clamp(50px, 13vh, 90px);
            align-items: center;
            justify-content: center;
        }

        .ad-mobile-top { order: -1; }
        .ad-mobile-bottom { order: 999; }

        /* Responsive breakpoints */
        @media (min-width: 768px) {
            .ad-desktop { display: flex; }
            .ad-mobile { display: none; }
            
            body {
                padding: 0 200px;
            }
        }

        @media (min-width: 1100px) {
            .ad-desktop { width: 160px; height: 600px; }
            body { padding: 0 220px; }
        }

        @media (max-width: 480px) {
            .ad-mobile { height: clamp(50px, 13vh, 70px); margin: 5px 0; }
            .ad-placeholder { font-size: 0.65rem; padding: 4px; }
        }

        @media (max-width: 767px) {
            .container {
                z-index: 60;
                position: relative;
            }
        }
        /* ===== END AD STYLES ===== */

        .container {
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            flex: 1;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 0;
            color: #fff;
            width: 100%;
            padding: 0 10px;
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 300;
            letter-spacing: clamp(2px, 1vw, 4px);
            background: linear-gradient(135deg, #ffffff 0%, #c9c9c9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: clamp(5px, 1vh, 10px);
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
            line-height: 1.2;
        }

        .status {
            display: none;
        }

        .grid-container {
            position: relative;
            width: min(92vw, 400px);
            aspect-ratio: 1;
            margin: clamp(10px, 3vh, 20px) auto;
            contain: layout style;
        }

        .grid {
            position: absolute;
            inset: 0;
            display: grid;
            gap: clamp(8px, 2.5vw, 20px);
            padding: clamp(8px, 2.5vw, 20px);
        }

        .dot {
            position: relative;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #a7a7a7, #656565);
            border: 2px solid #000000;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Minimum 44x44px touch target per Apple HIG */
            min-width: 44px;
            min-height: 44px;
            width: clamp(44px, 12vw, 80px);
            height: clamp(44px, 12vw, 80px);
            margin: auto;
        }

        .dot::before {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: #444;
            transition: all 0.2s ease;
        }

        .dot.active {
            border-color: rgb(189, 255, 182);
            background: radial-gradient(circle at 30% 30%, #09ff00, #006107);
            box-shadow: 
                0 0 25px rgba(89, 255, 0, 0.6),
                0 0 50px rgba(77, 255, 0, 0.3);
        }

        .dot.active::before {
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .dot.target {
            border-color: rgb(189, 255, 182);
            box-shadow: 
                0 0 15px rgba(251, 191, 36, 0.4),
                inset 0 0 10px rgba(251, 191, 36, 0.1);
        }

        .dot.target.revealed {
            background: radial-gradient(circle at 30% 30%, #09ff00, #006107);
            border-color: rgb(189, 255, 182);
            box-shadow: 
                0 0 25px rgba(89, 255, 0, 0.6),
                0 0 50px rgba(77, 255, 0, 0.3);
        }

        .dot.target.revealed::before {
            background: #fff;
        }

        svg.lines {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        path.line {
            fill: none;
            stroke: #ffffff;
            stroke-width: clamp(3px, 0.8vw, 4px);
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
            opacity: 0;
            animation: drawLine 0.3s ease forwards;
        }

        path.line.error {
            stroke: #ff0000;
            filter: drop-shadow(0 0 8px rgba(248, 113, 113, 0.8));
        }

        path.target-line {
            fill: none;
            stroke: #ffffff;
            stroke-width: clamp(2px, 0.6vw, 3px);
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.6));
            opacity: 0.8;
        }

        @keyframes drawLine {
            to { opacity: 1; }
        }

        .hint-btn {
            margin-top: clamp(15px, 3vh, 20px);
            padding: clamp(10px, 2.5vh, 12px) clamp(24px, 6vw, 30px);
            background: linear-gradient(135deg, #0b7e00 0%, #11ff00 100%);
            border: none;
            color: #ffffff; 
            border-radius: 25px;
            cursor: pointer;
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            display: block;
            margin-left: auto;
            margin-right: auto;
            font-weight: bold;
            min-height: 44px;
            min-width: 120px;
        }

        .hint-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(21, 255, 0, 0.4);
            filter: brightness(1.1);
        }

        .hint-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #2bff00;
            border-radius: 50%;
            pointer-events: none;
            animation: particle 1s ease-out forwards;
            z-index: 150;
        }

        @keyframes particle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .flash {
            position: fixed;
            inset: 0;
            background: rgba(102, 234, 115, 0.2);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 200;
        }

        .flash.show { opacity: 1; }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 20px;
        }

        .overlay.show { opacity: 1; pointer-events: all; }

        .overlay-text {
            color: #fff;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        /* ===== HOW TO PLAY & FOOTER STYLES ===== */
        .how-to-play {
            color: #aaa;
            max-width: 400px;
            text-align: center;
            margin: clamp(15px, 3vh, 20px) auto;
            line-height: 1.6;
            padding: 0 clamp(15px, 4vw, 20px);
        }

        .how-to-play h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: clamp(1rem, 3vw, 1.2rem);
        }

        .how-to-play p {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            margin-bottom: 8px;
        }

        footer {
            color: #666;
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            margin: clamp(15px, 3vh, 20px) 0;
            text-align: center;
            padding: clamp(15px, 3vh, 20px);
            width: 100%;
            max-width: 400px;
        }

        footer a {
            color: #667eea;
            margin: 0 10px;
            text-decoration: none;
            display: inline-block;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* ===== EXTRA SMALL SCREENS ===== */
        @media (max-width: 380px) {
            .grid {
                gap: 6px;
                padding: 6px;
            }
            .dot {
                min-width: 40px;
                min-height: 40px;
            }
            h1 {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }
            .hint-btn {
                font-size: 0.75rem;
                padding: 8px 20px;
            }
        }

        /* ===== SHORT SCREENS (landscape mobile) ===== */
        @media (max-height: 600px) {
            body {
                justify-content: flex-start;
                padding-top: env(safe-area-inset-top);
            }
            .grid-container {
                margin: 5px 0;
                width: min(85vw, 320px);
            }
            .how-to-play {
                margin: 8px auto;
                padding: 0 10px;
            }
            footer {
                margin: 10px 0;
                padding: 10px;
            }
            .header {
                margin-bottom: 5px;
            }
        }

        /* ===== DESKTOP ENHANCEMENTS ===== */
        @media (min-width: 768px) {
            .hint-btn:hover {
                transform: translateY(-2px);
            }
            .dot:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>

    <script>
        class GitLines {
            constructor() {
                this._failureTimeout = null;
                this.level = 1;
                this.baseSize = 3;
                this.gridSize = this.baseSize;
                this.dots = [];
                this.targetPattern = [];
                this.currentPattern = [];
                this.isDrawing = false;
                this.isComplete = false;
                this.showingIntro = false;
                this._introTimeouts = null;
                this._hintTimeouts = null;
                this._resizeTimeout = null;

                this.levelsPerGrid = 5;

                this.grid = document.getElementById('grid');
                this.svg = document.getElementById('svgLines');
                this.status = document.getElementById('status');
                this.hintBtn = document.getElementById('hintBtn');
                this.flash = document.getElementById('flash');
                this.overlay = document.getElementById('overlay');
                this.gridContainer = document.getElementById('gridContainer');

                this.init();
            }

            init() {
                this.generateLevel();
                this.setupEvents();
            }

            generateLevel() {
                if (this.showingIntro) {
                    this.cancelIntroPattern();
                }
                if (this._hintTimeouts) {
                    this._hintTimeouts.forEach(id => clearTimeout(id));
                    this._hintTimeouts = null;
                }
                
                this.gridSize = this.baseSize + Math.floor((this.level - 1) / this.levelsPerGrid);
                this.createGrid();
                this.generatePattern();
                this.showIntroPattern();
            }

            createGrid() {
                this.grid.innerHTML = '';
                this.svg.innerHTML = `
                    <defs>
                        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                `;

                this.grid.style.gridTemplateColumns = `repeat(${this.gridSize}, 1fr)`;
                this.grid.style.gridTemplateRows = `repeat(${this.gridSize}, 1fr)`;

                this.dots = [];
                for (let i = 0; i < this.gridSize * this.gridSize; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dot.dataset.index = i;
                    this.grid.appendChild(dot);
                    this.dots.push({
                        el: dot,
                        index: i,
                        row: Math.floor(i / this.gridSize),
                        col: i % this.gridSize,
                        rect: null // Cache for performance
                    });
                }
            }

            generatePattern() {
                const totalDots = this.gridSize * this.gridSize;
                let attempts = 0;
                let success = false;

                while (!success && attempts < 100) {
                    this.targetPattern = [];
                    const used = new Set();
                    const corners = [0, this.gridSize - 1, totalDots - this.gridSize, totalDots - 1];
                    const start = corners[Math.floor(Math.random() * corners.length)];
                    success = this.findHamiltonianPath(start, used, totalDots);
                    attempts++;
                }

                if (this.targetPattern.length < totalDots) {
                    this.generateSnakePattern();
                }

                this.currentPattern = [];
                this.isComplete = false;
            }

            findHamiltonianPath(current, used, targetLength) {
                this.targetPattern.push(current);
                used.add(current);

                if (this.targetPattern.length === targetLength) return true;

                const currentDot = this.dots[current];
                const neighbors = this.dots.filter(d => {
                    if (used.has(d.index)) return false;
                    const rowDiff = Math.abs(d.row - currentDot.row);
                    const colDiff = Math.abs(d.col - currentDot.col);
                    return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
                });

                // Shuffle neighbors for variety
                for (let i = neighbors.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [neighbors[i], neighbors[j]] = [neighbors[j], neighbors[i]];
                }

                for (const neighbor of neighbors) {
                    if (this.findHamiltonianPath(neighbor.index, used, targetLength)) return true;
                }

                this.targetPattern.pop();
                used.delete(current);
                return false;
            }

            generateSnakePattern() {
                this.targetPattern = [];
                for (let row = 0; row < this.gridSize; row++) {
                    if (row % 2 === 0) {
                        for (let col = 0; col < this.gridSize; col++) this.targetPattern.push(row * this.gridSize + col);
                    } else {
                        for (let col = this.gridSize - 1; col >= 0; col--) this.targetPattern.push(row * this.gridSize + col);
                    }
                }
            }

            getDotRect(dot) {
                // Cache bounding rect for performance
                if (!dot.rect) {
                    dot.rect = dot.el.getBoundingClientRect();
                }
                return dot.rect;
            }

            showIntroPattern() {
                this.showingIntro = true;
                this.overlay.classList.add('show');
                this.hintBtn.disabled = true;
                
                this.clearLines();
                this.svg.querySelectorAll('.target-line').forEach(line => line.remove());
                this.dots.forEach(d => d.el.classList.remove('target', 'revealed'));
                
                this._introTimeouts = [];
                
                const containerRect = this.gridContainer.getBoundingClientRect();
                const stepDelay = 100;
                
                const lineElements = [];
                for (let i = 0; i < this.targetPattern.length - 1; i++) {
                    const from = this.dots[this.targetPattern[i]];
                    const to = this.dots[this.targetPattern[i + 1]];
                    
                    const fromRect = this.getDotRect(from);
                    const toRect = this.getDotRect(to);
                    
                    const x1 = fromRect.left + fromRect.width / 2 - containerRect.left;
                    const y1 = fromRect.top + fromRect.height / 2 - containerRect.top;
                    const x2 = toRect.left + toRect.width / 2 - containerRect.left;
                    const y2 = toRect.top + toRect.height / 2 - containerRect.top;
                    
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M ${x1} ${y1} L ${x2} ${y2}`);
                    path.setAttribute('class', 'target-line');
                    path.style.opacity = '0';
                    path.style.transition = 'opacity 0.2s ease';
                    this.svg.appendChild(path);
                    lineElements.push(path);
                }
                
                const animateStep = (i) => {
                    if (i >= this.targetPattern.length) {
                        const cleanupTimeout = setTimeout(() => {
                            this.overlay.classList.remove('show');
                            this.dots.forEach(d => d.el.classList.remove('target', 'revealed'));
                            this.svg.querySelectorAll('.target-line').forEach(line => line.remove());
                            this.clearLines();
                            this.hintBtn.disabled = false;
                            this.showingIntro = false;
                            this._introTimeouts = null;
                        }, 1500);
                        this._introTimeouts.push(cleanupTimeout);
                        return;
                    }
                    
                    this.dots[this.targetPattern[i]].el.classList.add('target', 'revealed');
                    
                    if (i > 0 && lineElements[i - 1]) {
                        lineElements[i - 1].style.opacity = '0.8';
                    }
                    
                    const nextTimeout = setTimeout(() => animateStep(i + 1), stepDelay);
                    this._introTimeouts.push(nextTimeout);
                };
                
                animateStep(0);
            }
            
            cancelIntroPattern() {
                if (this._introTimeouts) {
                    this._introTimeouts.forEach(id => clearTimeout(id));
                    this._introTimeouts = null;
                }
                this.overlay.classList.remove('show');
                this.dots.forEach(d => d.el.classList.remove('target', 'revealed'));
                this.svg.querySelectorAll('.target-line').forEach(line => line.remove());
                this.clearLines();
                this.hintBtn.disabled = false;
                this.showingIntro = false;
            }

            setupEvents() {
                const container = this.gridContainer;

                const getDotFromEvent = (e) => {
                    const touch = e.touches ? e.touches[0] : e;
                    // Use clientX/Y which accounts for viewport scaling
                    const el = document.elementFromPoint(touch.clientX, touch.clientY);
                    return el?.closest('.dot');
                };

                const start = (e) => {
                    if (this.isComplete || this.showingIntro) return;
                    e.preventDefault();
                    
                    if (this._failureTimeout) {
                        clearTimeout(this._failureTimeout);
                        this._failureTimeout = null;
                    }

                    this.isDrawing = true;
                    this.currentPattern = [];
                    this.clearLines();

                    const dot = getDotFromEvent(e);
                    if (dot) this.addToPattern(parseInt(dot.dataset.index));
                };

                const move = (e) => {
                    if (!this.isDrawing || this.isComplete || this.showingIntro) return;
                    e.preventDefault();

                    const dot = getDotFromEvent(e);
                    if (dot) {
                        const index = parseInt(dot.dataset.index);
                        
                        // Allow undo by going back to previous dot
                        if (this.currentPattern.length > 1 && index === this.currentPattern[this.currentPattern.length - 2]) {
                            const lastIndex = this.currentPattern.pop();
                            this.dots[lastIndex].el.classList.remove('active');
                            this.drawLines();
                            return;
                        }

                        if (!this.currentPattern.includes(index)) {
                            if (this.isValidMove(index)) {
                                this.addToPattern(index);
                            }
                        }
                    }
                };

                const end = (e) => {
                    if (!this.isDrawing) return;
                    this.isDrawing = false;
                    this.checkPattern();
                };

                // Mouse events
                container.addEventListener('mousedown', start);
                container.addEventListener('mousemove', move);
                container.addEventListener('mouseup', end);
                container.addEventListener('mouseleave', end);
                
                // Touch events with passive: false for preventDefault
                container.addEventListener('touchstart', start, { passive: false });
                container.addEventListener('touchmove', move, { passive: false });
                container.addEventListener('touchend', end);
                container.addEventListener('touchcancel', end);

                // Resize handler with debounce for performance
                window.addEventListener('resize', () => {
                    // Debounce resize events
                    if (this._resizeTimeout) {
                        clearTimeout(this._resizeTimeout);
                    }
                    this._resizeTimeout = setTimeout(() => {
                        // Clear cached rects
                        this.dots.forEach(dot => { dot.rect = null; });
                        
                        // Redraw active lines on orientation change
                        if (this.isDrawing && !this.isComplete && this.currentPattern.length >= 2) {
                            this.drawLines();
                        }
                        this._resizeTimeout = null;
                    }, 100);
                });
            }

            isValidMove(index) {
                if (this.currentPattern.length === 0) return true;
                const lastIndex = this.currentPattern[this.currentPattern.length - 1];
                const lastDot = this.dots[lastIndex];
                const newDot = this.dots[index];
                const rowDiff = Math.abs(newDot.row - lastDot.row);
                const colDiff = Math.abs(newDot.col - lastDot.col);
                return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
            }

            addToPattern(index) {
                this.currentPattern.push(index);
                this.dots[index].el.classList.add('active');
                this.drawLines();
                
                // Auto-check if pattern is complete
                if (this.currentPattern.length === this.targetPattern.length) {
                    this.isDrawing = false;
                    this.checkPattern();
                }
            }

            drawLines() {
                this.svg.querySelectorAll('path.line').forEach(line => line.remove());
                if (this.currentPattern.length < 2) return;
                
                const containerRect = this.gridContainer.getBoundingClientRect();
                
                for (let i = 0; i < this.currentPattern.length - 1; i++) {
                    const from = this.dots[this.currentPattern[i]];
                    const to = this.dots[this.currentPattern[i + 1]];
                    
                    const fromRect = this.getDotRect(from);
                    const toRect = this.getDotRect(to);
                    
                    const x1 = fromRect.left + fromRect.width / 2 - containerRect.left;
                    const y1 = fromRect.top + fromRect.height / 2 - containerRect.top;
                    const x2 = toRect.left + toRect.width / 2 - containerRect.left;
                    const y2 = toRect.top + toRect.height / 2 - containerRect.top;
                    
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M ${x1} ${y1} L ${x2} ${y2}`);
                    path.setAttribute('class', 'line');
                    path.setAttribute('stroke', 'url(#lineGrad)');
                    this.svg.appendChild(path);
                }
            }

            clearLines() {
                this.svg.querySelectorAll('path.line').forEach(line => line.remove());
                this.dots.forEach(d => d.el.classList.remove('active'));
            }

            checkPattern() {
                if (this.arraysEqual(this.currentPattern, this.targetPattern)) {
                    this.onSuccess();
                } else {
                    this.onFailure();
                }
            }

            onSuccess() {
                this.isComplete = true;
                this.flash.classList.add('show');
                setTimeout(() => this.flash.classList.remove('show'), 300);
                this.createParticles();
                setTimeout(() => { this.level++; this.generateLevel(); }, 1500);
            }

            onFailure() {
                this.svg.querySelectorAll('path.line').forEach(p => p.classList.add('error'));
                this._failureTimeout = setTimeout(() => { 
                    this.currentPattern = []; 
                    this.clearLines(); 
                    this._failureTimeout = null;
                }, 800);
            }

            showHint() {
                if (this.isComplete || this.showingIntro) return;
                this.hintBtn.disabled = true;
                
                if (this._hintTimeouts) {
                    this._hintTimeouts.forEach(id => clearTimeout(id));
                }
                this._hintTimeouts = [];
                this.dots.forEach(d => d.el.classList.remove('target', 'revealed'));
                
                const stepDelay = 100;
                
                const animateHintStep = (i) => {
                    if (i >= this.targetPattern.length) {
                        const cleanupTimeout = setTimeout(() => {
                            this.dots.forEach(d => d.el.classList.remove('target', 'revealed'));
                            this.hintBtn.disabled = false;
                            this._hintTimeouts = null;
                        }, 1000);
                        this._hintTimeouts.push(cleanupTimeout);
                        return;
                    }
                    
                    this.dots[this.targetPattern[i]].el.classList.add('target', 'revealed');
                    const nextTimeout = setTimeout(() => animateHintStep(i + 1), stepDelay);
                    this._hintTimeouts.push(nextTimeout);
                };
                
                animateHintStep(0);
            }

            createParticles() {
                const containerRect = this.gridContainer.getBoundingClientRect();
                const centerX = containerRect.left + containerRect.width / 2;
                const centerY = containerRect.top + containerRect.height / 2;
                
                for (let i = 0; i < 20; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = centerX + 'px';
                    particle.style.top = centerY + 'px';
                    const angle = (Math.PI * 2 * i) / 20;
                    const distance = 100 + Math.random() * 100;
                    particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                    particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 1000);
                }
            }

            arraysEqual(a, b) {
                if (a.length !== b.length) return false;
                return a.every((val, i) => val === b[i]);
            }
        }

        // Initialize game when DOM is ready
        let game;
        document.addEventListener('DOMContentLoaded', () => {
            game = new GitLines();
        });
        
        // Fallback for older browsers
        if (document.readyState !== 'loading') {
            game = new GitLines();
        }
    </script>
</body>
</html>
